
services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: openlmis_dhis2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openlmis_dhis2}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openlmis_dhis2}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis (Cache & Celery Results Backend)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: openlmis_dhis2_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6378:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # RabbitMQ (Celery Broker)
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: openlmis_dhis2_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitmq}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5673:5672" # AMQP
      - "15673:15672" # Management UI
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # Django Application
  # ==========================================================================
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlmis_dhis2_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
    ports:
      - "8001:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-openlmis_dhis2}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbitmq}:${RABBITMQ_DEFAULT_PASS:-rabbitmq}@rabbitmq:5672//
      - OPENLMIS_BASE_URL=${OPENLMIS_BASE_URL:-https://openlmis.example.org}
      - OPENLMIS_CLIENT_ID=${OPENLMIS_CLIENT_ID:-}
      - OPENLMIS_CLIENT_SECRET=${OPENLMIS_CLIENT_SECRET:-}
      - OPENLMIS_USERNAME=${OPENLMIS_USERNAME:-}
      - OPENLMIS_PASSWORD=${OPENLMIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlmis_dhis2_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - logs_volume:/app/logs
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-openlmis_dhis2}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbitmq}:${RABBITMQ_DEFAULT_PASS:-rabbitmq}@rabbitmq:5672//
      - OPENLMIS_BASE_URL=${OPENLMIS_BASE_URL:-https://openlmis.example.org}
      - OPENLMIS_CLIENT_ID=${OPENLMIS_CLIENT_ID:-}
      - OPENLMIS_CLIENT_SECRET=${OPENLMIS_CLIENT_SECRET:-}
      - OPENLMIS_USERNAME=${OPENLMIS_USERNAME:-}
      - OPENLMIS_PASSWORD=${OPENLMIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ==========================================================================
  # Celery Beat (Scheduler)
  # ==========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlmis_dhis2_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - logs_volume:/app/logs
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-openlmis_dhis2}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbitmq}:${RABBITMQ_DEFAULT_PASS:-rabbitmq}@rabbitmq:5672//
      - SYNC_DAY_OF_MONTH=${SYNC_DAY_OF_MONTH:-5}
      - SYNC_HOUR=${SYNC_HOUR:-2}
      - SYNC_MINUTE=${SYNC_MINUTE:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      celery_worker:
        condition: service_started

  # ==========================================================================
  # Flower (Celery Monitoring - Optional)
  # ==========================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlmis_dhis2_flower
    restart: unless-stopped
    command: celery -A config flower --port=5555
    ports:
      - "5556:5555"
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbitmq}:${RABBITMQ_DEFAULT_PASS:-rabbitmq}@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery_worker
      - rabbitmq
      - redis

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  static_volume:
  logs_volume:


networks:
  default:
    name: openlmis_dhis2_network
